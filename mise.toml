[env]
_.path = ["./node_modules/.bin"]

[tools]
# Environments
bun = "1.3.14"
aube = "1.22.0"
# Linters & Formatters
hk = "1.48.0"
pkl = "0.31.1"
stylua = "2.5.2"

[deps.bun-aube]
description = "Automatically install dependencies via aube & bun's lockfile."
sources = ["package.json", "bun.lock"]
outputs = ["node_modules/"]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install && nuxt prepare"
auto = true

[tasks.dev]
run = "nuxt dev --open --public"

[tasks."dev:pwa"]
run = "VITE_PLUGIN_PWA=true nuxt dev -o"

[tasks.build]
run = "nuxt build"

[tasks.generate]
run = "nuxt generate"

[tasks.start]
run = "bun run .output/server/index.mjs"

[tasks."start:generate"]
run = "serve .output/public"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks."test:unit"]
# It seems like run vitest.cmd directly will cause
# tsnapi missing it's snapshot state...
run = "aubr vitest run --project unit"

[tasks."pretest:e2e"]
run = "playwright-core install --with-deps"

[tasks."test:e2e"]
depends = "pretest:e2e"
run = "aubr vitest run --project e2e"

[tasks."test:nuxt"]
run = "aubr vitest run --project nuxt"

[tasks.test]
depends = "pretest:e2e"
run = "aubr vitest run"

[tasks."test:watch"]
run = "aubr vitest"
